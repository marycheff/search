<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Поиск фильмов</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
	<div class="bg-effects">
		<div class="bg-orb bg-orb-1"></div>
		<div class="bg-orb bg-orb-2"></div>
		<div class="bg-orb bg-orb-3"></div>
	</div>

	<header class="header">
		<div class="header-inner">
			<!-- <div class="logo">
				<svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<circle cx="12" cy="12" r="10"/>
					<polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
				</svg>
				<span class="logo-text">Movie<span class="logo-accent">Search</span></span>
			</div>
			 -->
			<form id="movieSearchForm" class="search-form">
				<div class="search-wrapper">
					<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="11" cy="11" r="8"/>
						<line x1="21" y1="21" x2="16.65" y2="16.65"/>
					</svg>
					<input class="search-input" type="text" id="movieName" name="movieName" placeholder="Название фильма" required autocomplete="off">
					<button class="search-clear" type="button" id="searchClear" aria-label="Очистить">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<line x1="18" y1="6" x2="6" y2="18"/>
							<line x1="6" y1="6" x2="18" y2="18"/>
						</svg>
					</button>
					<button class="search-btn" type="submit">
						<span class="btn-text">Найти</span>
						<svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<line x1="5" y1="12" x2="19" y2="12"/>
							<polyline points="12 5 19 12 12 19"/>
						</svg>
					</button>
				</div>
		</form>
			<div class="header-actions">
				<div class="settings-wrapper">
					<button id="settingsButton" class="settings-btn" title="Настройки">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="12" r="3"/>
							<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
						</svg>
					</button>
					<div id="settingsDropdown" class="settings-dropdown">
						<div class="settings-dropdown-header">Настройки</div>
						<div class="settings-item">
							<div class="settings-item-info">
								<svg class="settings-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
									<circle cx="8.5" cy="8.5" r="1.5"/>
									<polyline points="21 15 16 10 5 21"/>
								</svg>
								<span>Постер фильма</span>
							</div>
							<label class="toggle-switch">
								<input type="checkbox" id="posterToggle" checked>
								<span class="toggle-slider"></span>
							</label>
						</div>
					</div>
				</div>
				<div class="history-wrapper">
					<button id="historyButton" class="history-btn" title="История">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="12" r="10"/>
							<polyline points="12 6 12 12 16 14"/>
						</svg>
					</button>
					<div id="historyDropdown" class="history-dropdown">
						<div class="history-dropdown-header">
							<span>История</span>
							<button id="clearHistoryBtn" class="history-clear-btn">Очистить</button>
						</div>
						<div id="historyList" class="history-list"></div>
						<div class="history-empty">История пуста</div>
					</div>
				</div>
			</div>
		</div>
	</header>

	<div id="headerMovieInfo" class="header-movie-info"></div>

	<main class="main-content">
		<div id="searchResults" class="results-container"></div>

		<div class="empty-state" id="emptyState">
			<div class="empty-icon">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="11" cy="11" r="8"/>
					<line x1="21" y1="21" x2="16.65" y2="16.65"/>
					<line x1="8" y1="11" x2="14" y2="11"/>
					<line x1="11" y1="8" x2="11" y2="14"/>
				</svg>
			</div>
			<h2 class="empty-title">Начните поиск</h2>
			<p class="empty-desc">Введите название фильма или ID Кинопоиска в строку поиска и наслаждайтесь просмотром</p>
		</div>
	</main>


	<script type="module" src="js/main.js"></script>
</body>

</html>
